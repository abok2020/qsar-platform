name: Train

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "configs/**"
      - "src/**"
      - "params.yaml"

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[train]
      - run: python -m qsar_platform.cli train-all --params params.yaml
